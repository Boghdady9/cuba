apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: cuba-benchmark-
  namespace: argo
spec:
  serviceAccountName: argo
  entrypoint: benchmark
  arguments:
    parameters:
      - name: target-url
        value: http://cuba-api.cuba.svc.cluster.local
  templates:
    - name: benchmark
      container:
        image: python:3.12-slim
        command: [sh, -c]
        args:
          - >
            pip install --no-cache-dir httpx &&
            python - <<'PY'
            import asyncio, statistics, time, httpx
            async def main():
                url = "{{workflow.parameters.target-url}}/v1/chat/completions"
                async with httpx.AsyncClient(timeout=60) as client:
                    async def once():
                        t0 = time.perf_counter()
                        r = await client.post(url, json={
                            "model":"cuba",
                            "messages":[{"role":"user","content":"benchmark"}],
                            "max_tokens":8,
                            "temperature":0,
                            "stream":False,
                        })
                        r.raise_for_status()
                        return time.perf_counter() - t0
                    samples = await asyncio.gather(*[once() for _ in range(20)])
                    print({"avg_s": statistics.mean(samples), "p95_s": sorted(samples)[18]})
            asyncio.run(main())
            PY
