# Prefer ``workflowtaskresults-executor.yaml`` in this folder (works when install.yaml
# omits ``create`` on workflowtaskresults). This file binds ``ClusterRole/argo-workflow-executor``
# if your cluster has it; if apply fails, use workflowtaskresults-executor.yaml instead.
#
#   kubectl apply -f argo/rbac/executor-for-default-sa.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-default-workflow-executor
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflow-executor
subjects:
  - kind: ServiceAccount
    name: default
    namespace: argo
