# Grants create/patch on WorkflowTaskResult for workflow pods. Some Argo install.yaml builds
# ship an argo-cluster-role that only lists workflowtaskresults — the wait container needs
# "create" to report node completion. Apply per cluster:
#   kubectl apply -f argo/rbac/workflowtaskresults-executor.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflowtaskresults-executor
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults", "workflowtaskresults/finalizers"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflowtaskresults-executor-binding
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflowtaskresults-executor
subjects:
  - kind: ServiceAccount
    name: argo
    namespace: argo
  - kind: ServiceAccount
    name: default
    namespace: argo
