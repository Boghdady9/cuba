apiVersion: apps/v1
kind: Deployment
metadata:
  name: cuba-api
  namespace: cuba
  labels:
    app.kubernetes.io/name: cuba-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cuba-api
  template:
    metadata:
      labels:
        app: cuba-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cuba-api
          image: cuba-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: cuba-api-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
